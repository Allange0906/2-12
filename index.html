<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>반 웹사이트 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, select, button { margin: 5px 0; padding: 8px; }
        #log { background: #333; color: #0f0; padding: 10px; height: 150px; overflow-y: scroll; font-family: monospace; }
    </style>
</head>
<body>

    <h2>🛠️ 백엔드 기능 테스트 화면</h2>

    <div class="box">
        <h3>1. 회원가입</h3>
        <input type="text" id="regId" placeholder="학번 (예: 20212)">
        <input type="text" id="regName" placeholder="이름 (예: 홍길동)">
        <input type="password" id="regPw" placeholder="비밀번호">
        <select id="regRole">
            <option value="학생">학생</option>
            <option value="관리자">관리자 (자동 승인됨)</option>
        </select>
        <button onclick="register()">가입하기</button>
    </div>

    <div class="box">
        <h3>2. 로그인</h3>
        <input type="text" id="loginId" placeholder="학번">
        <input type="password" id="loginPw" placeholder="비밀번호">
        <button onclick="login()">로그인하기</button>
        <p>🔑 발급받은 토큰: <span id="tokenDisplay" style="color: red;">아직 로그인 안 함</span></p>
    </div>

    <div class="box">
        <h3>3. 파일 업로드 (로그인 필수)</h3>
        <input type="file" id="fileInput">
        <input type="text" id="fileDesc" placeholder="파일 설명">
        <button onclick="uploadFile()">업로드하기</button>
    </div>

    <h3>결과 창 (서버 응답)</h3>
    <div id="log">여기에 결과가 표시됩니다...</div>

    <script>
        let myToken = ""; // 로그인 시 발급받은 토큰을 저장할 변수

        function logMessage(msg) {
            document.getElementById('log').innerHTML += `<br>> ${msg}`;
        }

        // 1. 회원가입 요청
        async function register() {
            const data = {
                studentId: document.getElementById('regId').value,
                name: document.getElementById('regName').value,
                password: document.getElementById('regPw').value,
                role: document.getElementById('regRole').value
            };
            
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            logMessage(`[회원가입 결과] ${JSON.stringify(result)}`);
        }

        // 2. 로그인 요청
        async function login() {
            const data = {
                studentId: document.getElementById('loginId').value,
                password: document.getElementById('loginPw').value
            };

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.token) {
                myToken = result.token; // 토큰 저장
                document.getElementById('tokenDisplay').innerText = "토큰 발급 완료!";
                document.getElementById('tokenDisplay').style.color = "blue";
            }
            logMessage(`[로그인 결과] ${JSON.stringify(result)}`);
        }

        // 3. 파일 업로드 요청
        async function uploadFile() {
            if (!myToken) {
                alert("먼저 로그인을 해주세요!");
                return;
            }

            const fileField = document.getElementById('fileInput');
            const formData = new FormData();
            formData.append('file', fileField.files[0]);
            formData.append('description', document.getElementById('fileDesc').value);
            formData.append('category', '기타'); // 임시 카테고리

            const response = await fetch('/api/files/upload', {
                method: 'POST',
                // 주의: 파일을 보낼 땐 Content-Type을 수동으로 설정하지 않아! 브라우저가 알아서 해줌.
                headers: { 'Authorization': `Bearer ${myToken}` }, 
                body: formData
            });
            
            const result = await response.json();
            logMessage(`[파일 업로드 결과] ${JSON.stringify(result)}`);
        }
    </script>
</body>
</html>
